<div class="logo" onclick="sw('home',document.querySelector('.nb'))">Ned<span>.</span></div>
<nav class="nav">
<button class="nb active" onclick="sw('home',this)">Home</button>
<button class="nb" onclick="sw('theorie',this)">Theorie</button>
<button class="nb" onclick="sw('flashcards',this)">Flashcards</button>
<button class="nb" onclick="sw('quiz',this)">Quiz</button>
<button class="nb" onclick="sw('dictee',this)">Dictee</button>
<button class="nb" onclick="sw('woorden',this)">Woorden</button>
</nav>
</header>
<main class="main">
<div class="view active" id="view-home">
<div class="home-hero"><h1 id="home-title">Klaar voor<br>je toets?</h1><p>Nederlands · H3 · 3.3 t/m 3.9 (min 3.4) · Havo/vwo</p></div>
<div id="journey"></div>
</div>
<div class="view" id="view-theorie">
<input class="si" id="theory-search" placeholder="Zoek een begrip..." style="margin-bottom:16px">
<div id="tc"></div>
</div>
<div class="view" id="view-flashcards">
<div class="fcc"><div class="fbar" id="fcfb"></div><div style="display:flex;gap:8px;align-items:center"><span style="font-size:13px;color:var(--muted)" id="fcc2"></span><button class="btn" onclick="shuffleFC()" style="font-size:12px;padding:6px 14px">Schudden</button></div></div>
<div class="pbar"><div class="pfill" id="fcp"></div></div>
<div id="fca2"></div>
</div>
<div class="view" id="view-quiz">
<div class="fbar" id="qfb2" style="margin-bottom:16px"></div>
<div id="qa"></div>
</div>
<div class="view" id="view-dictee">
<div class="slabel" style="margin-top:0">Dicteewoorden oefenen</div>
<p class="dictee-intro">Het woord verschijnt kort — onthoud het en typ het dan uit je hoofd. Typ je het fout? Dan moet je het 3x correct typen voor je verder mag!</p>
<div class="dictee-game">
<div class="dp2" id="dp2"></div>
<div class="dwd" id="dwd"></div>
<div class="dh" id="dh"></div>
<input class="di" id="di" placeholder="typ hier..." autocomplete="off" autocorrect="off" spellcheck="false">
<div class="dfb" id="dfb"></div>
<div class="dbtns" id="dbtns"></div>
<div style="font-size:13px;color:var(--muted);margin-top:16px" id="ds"></div>
</div>
</div>
<div class="view" id="view-woorden">
<div class="slabel" style="margin-top:0">Schooltaalwoorden</div>
<input class="si" id="ss" placeholder="Zoek een schooltaalwoord..." style="margin-bottom:10px" oninput="fw('ss','sl',stw)">
<div id="sl"></div>
<div class="slabel">Woordenlijst 3.5</div>
<input class="si" id="ws" placeholder="Zoek een woord..." style="margin-bottom:10px" oninput="fw('ws','wl',wl35)">
<div id="wl"></div>
</div>
</main>

{t:'Spanning',icon:'⚡',d:'Een verhaal heeft spanning als je steeds verder wilt lezen. Het roept vragen op — hoe nieuwsgieriger je bent, hoe groter de spanning.',tip:'Spanning houdt lezers geboeid — het is de motor van een verhaal.',ex:'Je leest een detective en wilt weten wie de moordenaar is.'},

{id:'33l',label:'3.3 Lezen',tag:'ta',icon:'📄',color:'#7A4F1A',concepts:[
{t:'Tekstopbouw',icon:'🏗️',d:'De logische volgorde van informatie in een tekst.<br><br><strong>Tweedeling:</strong> inleiding – kern (bijv. nieuwsbericht)<br><strong>Driedeling:</strong> inleiding – kern – slot (bijv. artikel)',tip:'Als je een tekst verkennend leest, kun je de opbouw al herkennen.',illus:'tekstopbouw'},
{t:'Inleiding',icon:'🚪',d:'Het eerste deel van een tekst. Bevat bijna altijd informatie waaruit je het onderwerp kunt afleiden. Kan een samenvatting geven of een vraag stellen.',tip:'Lees altijd eerst de inleiding om te weten waar de tekst over gaat.'},
{t:'Kern',icon:'🍎',d:'Het langste deel van de tekst. Behandelt het onderwerp uitgebreid. Je kunt er vaak deelonderwerpen in onderscheiden.',tip:'De kern bevat de meeste informatie en de hoofdzaken.'},
{t:'Slot',icon:'🔒',d:'Het laatste deel. Bevat meestal een samenvatting of conclusie. <strong>Er staat geen nieuwe informatie in het slot.</strong>',tip:'Lees het slot om snel de conclusie van een tekst te begrijpen.'},
{t:'Kernzin',icon:'⭐',d:'De belangrijkste zin van een alinea. De rest is uitleg of uitwerking. Kan staan als:<ul><li><strong>Eerste zin</strong> → meest voorkomend</li><li><strong>Tweede zin</strong> → eerste zin is dan een inleiding</li><li><strong>Laatste zin</strong> → de rest bouwt naar de conclusie toe</li></ul>',tip:'Vraag je af: welke zin kun je niet weglaten?',illus:'kernzin'},
{t:'Hoofdgedachte',icon:'💡',d:'Het belangrijkste wat de schrijver over het onderwerp zegt.<br><br><table><tr><th>Kijk naar</th><th>Wat vind je er</th></tr><tr><td>Titel / inleiding</td><td>Soms samenvatting of een vraag</td></tr><tr><td>Kernzinnen kern</td><td>Deelgedachten samen</td></tr><tr><td>Slotalinea</td><td>Soms antwoord of conclusie</td></tr></table>',tip:'Formuleer de hoofdgedachte in één zin als antwoord op: wat wil de schrijver zeggen?'},
{t:'Hoofdzaken',icon:'🎯',d:'Het belangrijkste wat over het onderwerp gezegd wordt. Noteer je bij een samenvatting.<ul><li>Onderscheid deelonderwerpen → kijk per deelonderwerp wat de hoofdzaak is</li><li>Gebruik de kernzinnen van de alinea\'s</li></ul>',tip:'Hoofdzaken = wat je moet weten. Bijzaken = de details.'},
{t:'Bijzaken',icon:'🗑️',d:'De minder belangrijke informatie in een tekst. Voorbeelden, uitleg, details. Laat je weg bij een samenvatting.',ex:'"Honden zijn trouwe dieren [hoofdzaak]. Een bekend voorbeeld is Hachiko [bijzaak]."'},
{t:'Verwijswoorden',icon:'👆',d:'Woorden die de schrijver gebruikt om herhaling te vermijden. Verwijzen bijna altijd naar iets eerder in de tekst.<br><br><strong>Veelvoorkomend:</strong> hij, zij, het, ze, dit, dat, deze, die<br><br><strong>Truc:</strong> stel een vraag met <em>wie, wat, waar</em> of <em>welk(e)</em>.',tip:'Zoek altijd terug in de tekst — verwijswoorden verwijzen bijna nooit vooruit.',ex:'"Mijn broer Willem spaart voor zijn rijbewijs. <u>Hij</u> wil rijles nemen." → Wie? → mijn broer Willem.'},
]},

{t:'Signaalwoorden tegenstelling',icon:'🚦',d:'Woorden die aangeven dat er een tegenstelling komt:<br><br><table><tr><th>Woord</th><th>Voorbeeld</th></tr><tr><td><em>maar</em></td><td>Afgezaagd, maar origineel.</td></tr><tr><td><em>daarentegen</em></td><td>Lokaal, andere zijn wijdverbreid.</td></tr><tr><td><em>juist</em></td><td>In theorie moeilijk, juist simpel.</td></tr><tr><td><em>in tegenstelling tot</em></td><td>Recent, in tegenstelling tot oud.</td></tr></table><br>Meer: <em>echter, evenwel, toch, in tegendeel, enerzijds…anderzijds, daar staat tegenover</em>'},

{t:'Achtervoegsel -loos',icon:'➖',d:'<strong>-loos</strong> = zonder<ul><li>emotieloos = zonder emoties</li><li>roekeloos = zonder voorzichtigheid</li><li>werkeloos = zonder werk</li><li>zinloos = zonder zin/doel</li></ul>',tip:'Als je het grondwoord kent, begrijp je de betekenis meteen.'},
]},
{id:'36s',label:'3.6 Spreken',tag:'tp',icon:'🎤',color:'#7A2E55',concepts:[
{t:'Mondeling verslag',icon:'🎙️',d:'Je beschrijft mondeling wat je hebt meegemaakt of onderzocht. Doel: anderen <strong>informeren</strong> over feiten.<br><br><strong>Verschil met schriftelijk:</strong><ul><li>Korter</li><li>Beantwoord soms vragen van publiek</li></ul>Gebruik de <strong>5W1H-vragen</strong>: Wie? Wat? Waar? Wanneer? Waarom? Hoe?',tip:'Een mondeling verslag is een voorbeeld van een spreektaak. Een spreekbeurt is een ander voorbeeld.'},
{t:'Spreekbeurt',icon:'🏆',d:'Een spreektaak waarbij je over een zelfgekozen onderwerp vertelt dat je hebt <em>uitgezocht</em>.<br><br><strong>Verschil met mondeling verslag:</strong><ul><li>Verslag = rapporteer iets wat je hebt <em>meegemaakt/onderzocht</em></li><li>Spreekbeurt = informeer over iets wat je hebt <em>uitgezocht</em></li></ul>Beide hebben dezelfde opbouw: inleiding – kern – slot.',tip:'Bij een spreekbeurt kies je zelf een onderwerp; bij een verslag rapporteer je over iets wat al is gebeurd.'},
{t:'Signaalwoorden verslag',icon:'⏱️',d:'Gebruik deze woorden om feiten chronologisch te vertellen:<ul><li><strong>toen</strong> — geeft een moment aan</li><li><strong>daarna</strong> — geeft volgorde aan</li><li><strong>vervolgens</strong> — geeft volgende stap aan</li><li><strong>uiteindelijk</strong> — geeft eindresultaat aan</li></ul>',tip:'Signaalwoorden maken je verslag overzichtelijk en gemakkelijk te volgen.'},
{t:'Opbouw mondeling verslag',icon:'📐',d:'<table><tr><th>Deel</th><th>Inhoud</th><th>Ezelsbruggetje</th></tr><tr><td><strong>Inleiding</strong></td><td>Binnenkomer + overzicht</td><td>"Zeg wat je gaat zeggen"</td></tr><tr><td><strong>Kern</strong></td><td>Deelonderwerpen + signaalwoorden</td><td>"Zeg het"</td></tr><tr><td><strong>Slot</strong></td><td>Samenvatting + vragen</td><td>"Zeg wat je hebt gezegd"</td></tr></table>'},
{t:'Spreektaak uitvoeren',icon:'✅',d:'<strong>Voorbereiding:</strong><ul><li>Maak een spiekbriefje met kernwoorden</li><li>Schrijf de tekst NIET helemaal uit — anders ga je voorlezen</li></ul><strong>Tijdens:</strong><ul><li>Kijk je publiek aan (oogcontact)</li><li>Sta rechtop (houding)</li><li>Handen vrij voor gebaren</li><li>Spreek duidelijk, niet te snel</li></ul>'},
{t:'Non-verbaal gedrag',icon:'🤝',d:'Alles wat je communiceert zonder woorden:<ul><li><strong>Oogcontact</strong> — houdt publiek betrokken</li><li><strong>Houding</strong> — rechtop = zelfvertrouwen</li><li><strong>Gebaren</strong> — ondersteunen je verhaal</li><li><strong>Spreektempo</strong> — niet te snel/langzaam</li><li><strong>Stemgebruik</strong> — varieer in toon en volume</li></ul>',tip:'Je lichaamstaal zegt soms meer dan je woorden!'},
]},
{id:'3738g',label:'3.7–3.8 Grammatica',tag:'tpu',icon:'✏️',color:'#4A3580',concepts:[
{t:'Werkwoordelijk gezegde (wg)',icon:'⚙️',d:'Het onderwerp <em>doet</em> iets. Het werkwoord heeft een duidelijke, zelfstandige betekenis.',ex:'"Hij heeft erg hard gewerkt." → wg = heeft gewerkt (gewerkt = zww, heeft = hww)'},
{t:'Naamwoordelijk gezegde (ng)',icon:'🔗',d:'Het werkwoord heeft <em>geen</em> duidelijke zelfstandige betekenis → aanvulling nodig (zn. of bn.).',tip:'Truc: kun je het werkwoord vervangen door worden/zijn/blijven? Dan is het een ng!',ex:'"Ik ben leraar op een middelbare school." → kww = ben · naamw. deel = leraar op... · ng = ben leraar...'},
{t:'Zelfstandig werkwoord (zww)',icon:'💪',d:'Heeft een duidelijke betekenis en vormt het wg alleen of samen met hww\'s. In een wg met meerdere werkwoorden is er maar één zww.',ex:'"Zijn vader zingt." → zingt = zww<br>"Ik heb gevolgd." → gevolgd = zww, heb = hww'},
{t:'Koppelwerkwoord (kww)',icon:'🔑',d:'Staat altijd in een naamwoordelijk gezegde. Koppelt het onderwerp aan het naamwoordelijk deel.<br><br><strong>Belangrijkste kww\'s: worden, zijn, blijven</strong>',tip:'Truc: kun je het werkwoord vervangen door zijn/worden/blijven? Dan is het een kww!'},
{t:'Hulpwerkwoord (hww)',icon:'🛠️',d:'Helpt het zww of kww het gezegde vormen.<br><br><strong>hww + zww → wg:</strong> "Igor kan zingen." → kan = hww<br><strong>hww + kww → ng:</strong> "Sarah wil dokter worden." → wil = hww<br><br><em>Voorbeelden: hebben, zijn, worden, zullen, willen, kunnen, moeten</em><br><br>Meerdere hww\'s: "Hij zou beter willen kunnen zingen."'},
{t:'Blijven: zww, hww of kww?',icon:'🔄',d:'<table><tr><th>Zin</th><th>Rol</th><th>Gezegde</th></tr><tr><td><em>Ze is thuis gebleven.</em></td><td>zww</td><td>wg = is gebleven</td></tr><tr><td><em>Ze blijft lachen.</em></td><td>hww</td><td>wg = blijft lachen</td></tr><tr><td><em>Ze is enthousiast gebleven.</em></td><td>kww</td><td>ng = is enthousiast gebleven</td></tr></table>',tip:'Vraag je af: doet het onderwerp iets (wg) of is/wordt/blijft het iets (ng)?'},
]},

{t:"'T KoFSCHiP X",icon:'⛵',d:'Ezelsbruggetje voor -te(n) of -de(n).<br><br><span class="pill">\'T KoFSCHiP X</span><br><br>Eindigt de stam op t, k, f, s, ch, p of x? → <strong>-te(n)</strong><br>Alle andere letters? → <strong>-de(n)</strong>',tip:'Gebruik de stam om te kiezen, maar de ik-vorm als basis.',illus:'kofschip'},
{t:'pv-vt-zwak maken',icon:'📐',d:'<strong>Stap 1:</strong> Bepaal de stam (= ik-vorm tt)<br><strong>Stap 2:</strong> Kijk naar de laatste letter van de stam<br><strong>Stap 3:</strong> In \'T KoFSCHiP X? → -te(n) / anders → -de(n)<br><strong>Stap 4:</strong> Plak achter de ik-vorm<br><br><table><tr><th>Werkwoord</th><th>Stam</th><th>Letter</th><th>Ik-vorm</th><th>pv-vt</th></tr><tr><td>bedanken</td><td>bedank</td><td>k ✓</td><td>bedank</td><td>bedankte</td></tr><tr><td>relaxen</td><td>relax</td><td>x ✓</td><td>relax</td><td>relaxte</td></tr><tr><td>gooien</td><td>gooi</td><td>i ✗</td><td>gooi</td><td>gooide</td></tr><tr><td>verhuizen</td><td>verhuiz</td><td>z ✗</td><td>verhuis</td><td>verhuisde</td></tr></table>'},

function buildTheorie(){
const c=document.getElementById('tc');
chapters.forEach(ch=>{
const sec=document.createElement('div');sec.className='ch-sec';sec.dataset.chid=ch.id;
sec.innerHTML=`<div class="slabel">${ch.label}</div>`;
ch.concepts.forEach(con=>{
const k=ch.id+'_'+con.t;const isK=!!known[k];
const el=document.createElement('div');el.className='concept'+(isK?' known':'');
el.dataset.key=k;el.dataset.s=(con.t+' '+(con.d||'')+' '+(con.tip||'')+' '+(con.ex||'')).toLowerCase().replace(/<[^>]+>/g,'');
const kid='k'+(uid++);
let body=con.d||'';
if(con.tip) body+=`<div class="tip"><strong>Tip:</strong> ${con.tip}</div>`;
if(con.ex) body+=`<div class="example"><strong>Voorbeeld:</strong> ${con.ex}</div>`;
if(con.illus&&ILLUS[con.illus]) body+=`<div class="illus">${ILLUS[con.illus]}</div>`;
body+=`<button class="mark-known${isK?' marked':''}" data-key="${k}" onclick="toggleKnown(event,'${k}',this)">${isK?'Gekend ✓':'Markeer als gekend'}</button>`;
el.innerHTML=`<div class="ch2"><span class="cicon">${con.icon||''}</span><span class="tag ${ch.tag}">${ch.label}</span><span class="cterm">${con.t}</span><span class="known-dot"></span><span class="cchev" id="v${kid}">›</span></div><div class="cbody" id="b${kid}">${body}</div>`;
el.addEventListener('click',e=>{
if(e.target.classList.contains('mark-known'))return;
const body=document.getElementById('b'+kid);
const chev=document.getElementById('v'+kid);
body.classList.toggle('open');chev.classList.toggle('open');
if(body.classList.contains('open')){
const kc=body.querySelector('[data-kofschip]');
if(kc&&!kc.dataset.built){kc.dataset.built='1';buildKofschip(kc);}
}
});
sec.appendChild(el);
});
c.appendChild(sec);
});

function toggleKnown(e,key,btn){
e.stopPropagation();known[key]=!known[key];saveKnown();
btn.closest('.concept').classList.toggle('known',!!known[key]);
btn.textContent=known[key]?'Gekend ✓':'Markeer als gekend';
btn.classList.toggle('marked',!!known[key]);
}

document.getElementById('fcc2').textContent=`${fcIdx+1} / ${total}`;
document.getElementById('fcp').style.width=Math.round((fcIdx/total)*100)+'%';
document.getElementById('fca2').innerHTML=`<div class="fccard" id="fcm" onclick="flipFC()" ${isK?'style="border-left:3px solid var(--green)"':''}><div class="fcside" id="fcs">Begrip</div><div class="fcterm">${card.t}</div><div class="fcdef" id="fcd">${card.d}</div><div class="fchint" id="fch">Tik om te onthullen</div></div><div class="fcbtns" id="fcb" style="display:none"><button class="fca retry" onclick="nextFC(false)">Nog niet</button><button class="fca knew" onclick="nextFC(true)">Ik wist het ✓</button></div>`;
fcFlipped=false;
}
function flipFC(){if(fcFlipped)return;fcFlipped=true;document.getElementById('fcd').classList.add('show');document.getElementById('fcs').textContent='Uitleg';document.getElementById('fch').style.display='none';document.getElementById('fcb').style.display='flex';}
function nextFC(knew){const card=fcCards[fcIdx];if(knew){known[card.k]=true;saveKnown();}else fcCards.push(fcCards[fcIdx]);fcIdx++;renderFC();}
function initQ(){let pool=qFilter==='all'?[...qq]:qq.filter(q=>q.ch===qFilter);qItems=pool.sort(()=>Math.random()-.5).slice(0,Math.min(10,pool.length));qIdx=0;qScore=0;qAnswered=false;renderQ();}
function renderQ(){
const area=document.getElementById('qa'),total=qItems.length;
if(!total){area.innerHTML='<p style="color:var(--muted);font-size:14px">Geen vragen.</p>';return;}
if(qIdx>=total){const pct=Math.round((qScore/total)*100);const prev=parseInt(localStorage.getItem('nl_quizbest')||'0');if(pct>prev)localStorage.setItem('nl_quizbest',pct);const msg=pct>=80?'Uitstekend! Je bent er klaar voor 💪':pct>=60?'Goed bezig! Nog even herhalen.':'Blijf oefenen!';area.innerHTML=`<div class="qresult"><div class="qsb">${qScore}/${total}</div><div class="qsp">${pct}% · ${msg}</div><button class="btn" onclick="initQ()">Opnieuw</button></div>`;return;}
const item=qItems[qIdx];qAnswered=false;
area.innerHTML=`<div class="qhr"><span class="qnum">Vraag ${qIdx+1} van ${total}</span><span class="qscore">${qScore} goed</span></div><div class="pbar"><div class="pfill" style="width:${Math.round((qIdx/total)*100)}%"></div></div><div class="qq">${item.q}</div><div class="qopts">${item.o.map((o,i)=>`<button class="qopt" onclick="answerQ(${i})" id="qo${i}">${o}</button>`).join('')}</div><div class="qfb" id="qf"></div><button class="qnext" id="qn" onclick="nextQ()">Volgende →</button>`;
}
function answerQ(i){if(qAnswered)return;qAnswered=true;const item=qItems[qIdx];document.querySelectorAll('.qopt').forEach(o=>o.disabled=true);document.getElementById('qo'+item.a).classList.add('correct');const fb=document.getElementById('qf');if(i===item.a){qScore++;fb.textContent='Goed! '+item.e;fb.className='qfb show ok';}else{document.getElementById('qo'+i).classList.add('wrong');fb.textContent='Niet helemaal. '+item.e;fb.className='qfb show nok';}document.getElementById('qn').classList.add('show');}
function nextQ(){qIdx++;renderQ();}
let dRetryNeeded=0,dRetryDone=0;
function initDictee(){
dWords=[...dictee].sort(()=>Math.random()-.5);
dIdx=0;dScore=0;dWrong=[];dRetryNeeded=0;dRetryDone=0;
renderDictee();
}
function renderDictee(){
const total=dWords.length;
if(dIdx>=total){
const pct=Math.round((dScore/total)*100);
document.getElementById('dwd').textContent='';
document.getElementById('dh').textContent='';
document.getElementById('dp2').innerHTML='';
document.getElementById('di').style.display='none';
document.getElementById('dfb').textContent='';
document.getElementById('ds').textContent='';
const prev=parseInt(localStorage.getItem('nl_dictee_best')||'0');
if(pct>prev)localStorage.setItem('nl_dictee_best',pct);
document.getElementById('dbtns').innerHTML=`<div style="text-align:center;width:100%">
<div style="font-family:'Georgia',serif;font-size:48px;font-weight:700;margin-bottom:8px">${dScore}/${total}</div>
<div style="font-size:15px;color:var(--muted);margin-bottom:20px">${pct}% goed${dWrong.length?' · Fout: '+dWrong.join(', '):''}</div>
<button class="btn" onclick="initDictee()">Opnieuw</button>
</div>`;
return;
}
const word=dWords[dIdx];
const isRetry=dRetryNeeded>0;
// Progress dots
document.getElementById('dp2').innerHTML=dWords.map((_,i)=>`<div class="dp${i===dIdx?' cur':i<dIdx?(dWrong.includes(dWords[i])?' nok2':' ok2'):''}"></div>`).join('');
// Show word briefly then hide
const wdEl=document.getElementById('dwd');
wdEl.textContent=word;
wdEl.classList.remove('hidden');
setTimeout(()=>{ wdEl.classList.add('hidden'); }, 1200);
// Hint text
const hintEl=document.getElementById('dh');
if(isRetry){
hintEl.innerHTML=`<span style="color:var(--red);font-weight:500">Fout! Typ dit woord ${3-dRetryDone}x correct om door te gaan</span>`;
} else {
hintEl.textContent=`${dIdx+1} van ${total} · onthoud het woord en typ het uit je hoofd`;
}
// Retry pips
let pipsHtml='';
if(isRetry){
pipsHtml='<div class="retry-pips">';
for(let i=0;i<3;i++) pipsHtml+=`<div class="retry-pip${i<dRetryDone?' done':i===dRetryDone?' cur':''}"></div>`;
pipsHtml+='</div>';
}
const inp=document.getElementById('di');
inp.style.display='block';
inp.value='';
inp.className='di';
setTimeout(()=>inp.focus(), 100);
document.getElementById('dfb').textContent='';
document.getElementById('dfb').className='dfb';
document.getElementById('ds').innerHTML=`Score: ${dScore}/${dIdx}${pipsHtml}`;
document.getElementById('dbtns').innerHTML=`<button class="btn primary" onclick="checkDictee()">Controleer</button>`;
inp.onkeydown=e=>{if(e.key==='Enter')checkDictee();};
}
function checkDictee(){
const word=dWords[dIdx];
const inp=document.getElementById('di');
const ans=inp.value.trim().toLowerCase();
const fb=document.getElementById('dfb');
const isRetry=dRetryNeeded>0;
if(ans===word.toLowerCase()){
inp.className='di correct';
if(isRetry){
dRetryDone++;
if(dRetryDone>=3){
fb.textContent='Woord geleerd! ✓';fb.className='dfb ok';
dRetryNeeded=0;dRetryDone=0;
setTimeout(()=>{dIdx++;renderDictee();},700);
} else {
fb.textContent=`Goed! Nog ${3-dRetryDone}x ✓`;fb.className='dfb ok';
setTimeout(()=>{renderDictee();},600);
}
} else {
fb.textContent='Goed! ✓';fb.className='dfb ok';
dScore++;
setTimeout(()=>{dIdx++;renderDictee();},700);
}
} else {
inp.className='di wrong';
fb.innerHTML='Fout — het is: <strong>'+word+'</strong> · typ dit woord 3x correct';
fb.className='dfb nok';
if(!dWrong.includes(word))dWrong.push(word);
dRetryNeeded=3;
dRetryDone=0;
setTimeout(()=>{renderDictee();},1200);
}
}
function skipDictee(){
if(!dWrong.includes(dWords[dIdx]))dWrong.push(dWords[dIdx]);
dIdx++;renderDictee();
}
function fw(sid,lid,data){const q=document.getElementById(sid).value.toLowerCase();const rows=data.filter(r=>r[0].toLowerCase().includes(q)||r[1].toLowerCase().includes(q));document.getElementById(lid).innerHTML=rows.length?rows.map(r=>`<div class="wrow"><span class="wt">${r[0]}</span><span class="wm">${r[1]}</span></div>`).join(''):'<p style="color:var(--hint);font-size:14px;padding:10px 4px">Geen resultaten.</p>';}
function rl(id,d){document.getElementById(id).innerHTML=d.map(r=>`<div class="wrow"><span class="wt">${r[0]}</span><span class="wm">${r[1]}</span></div>`).join('');}
function buildKofschip(container){
const letters=[{l:"'T",t:'x'},{l:'K',t:'te'},{l:'o',t:'de'},{l:'F',t:'te'},{l:'S',t:'te'},{l:'C',t:'te'},{l:'H',t:'te'},{l:'i',t:'de'},{l:'P',t:'te'},{l:' ',t:'sp'},{l:'X',t:'te'}];
const exs=[{w:'bedanken',stem:'bedank',last:'k',ikv:'bedank',vt:'bedankte',type:'te'},{w:'relaxen',stem:'relax',last:'x',ikv:'relax',vt:'relaxte',type:'te'},{w:'fietsen',stem:'fiets',last:'s',ikv:'fiets',vt:'fietste',type:'te'},{w:'koken',stem:'kook',last:'k',ikv:'kook',vt:'kookte',type:'te'},{w:'lachen',stem:'lach',last:'ch',ikv:'lach',vt:'lachte',type:'te'},{w:'gooien',stem:'gooi',last:'i',ikv:'gooi',vt:'gooide',type:'de'},{w:'verhuizen',stem:'verhuiz',last:'z',ikv:'verhuis',vt:'verhuisde',type:'de'},{w:'leven',stem:'leef',last:'f',ikv:'leef',vt:'leefde',type:'te'},{w:'bouwen',stem:'bouw',last:'w',ikv:'bouw',vt:'bouwde',type:'de'}];
const kof='tkfschpx';
const res=container.querySelector('.kl-res');
const lr=container.querySelector('.kl-row');
const er=container.querySelector('.kl-exrow');
if(!res||!lr||!er)return;
function showEx(ex){
const isTe=ex.type==='te',cl=isTe?'color:#1A3D63':'color:#444441',end=isTe?'-te(n)':'-de(n)';
res.innerHTML='<strong style="'+cl+'">'+ex.w+'</strong> → stam: <strong>'+ex.stem+'</strong> · laatste letter: <strong>'+ex.last+'</strong><br>'+(kof.includes(ex.last.toLowerCase())?'In \'T KoFSCHiP X':'Niet in \'T KoFSCHiP X')+' → <strong style="'+cl+'">'+end+'</strong><br>Ik-vorm: <strong>'+ex.ikv+'</strong> + '+end.replace('(n)','')+' = <strong style="'+cl+'">'+ex.vt+'</strong>';
}
letters.forEach(l=>{
if(l.t==='sp'){const s=document.createElement('div');s.style.width='8px';lr.appendChild(s);return;}
const el=document.createElement('div');
el.style.cssText='width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;border:1.5px solid;font-family:system-ui,-apple-system,sans-serif;user-select:none;'+(l.t==='te'?'background:#E8F0FA;color:#1A3D63;border-color:#185FA5;cursor:pointer':'background:#F0EEE7;color:#ACA89E;border-color:#E3DFD5');
el.textContent=l.l;
if(l.t==='te'){
el.addEventListener('click',()=>{
lr.querySelectorAll('[data-kl]').forEach(x=>x.style.transform='');
el.style.transform='scale(1.12)';
const m=exs.find(e=>e.last.toLowerCase()===l.l.toLowerCase());
if(m)showEx(m);else res.innerHTML='Letter <strong>'+l.l+'</strong> staat in \'T KoFSCHiP X → gebruik <strong style="color:#1A3D63">-te(n)</strong>';
});
el.setAttribute('data-kl','1');
}
lr.appendChild(el);
});
exs.forEach(ex=>{
const b=document.createElement('button');
b.style.cssText='font-size:12px;padding:4px 10px;border-radius:7px;cursor:pointer;border:1px solid #E3DFD5;background:#fff;color:#18170F;font-family:system-ui,-apple-system,sans-serif;transition:all .15s';
b.textContent=ex.w;
b.addEventListener('click',()=>showEx(ex));
er.appendChild(b);
});
}
buildTheorie();buildFCFilter();buildQFilter();
renderHome();rl('sl',stw);rl('wl',wl35);
document.getElementById('ss').addEventListener('input',()=>fw('ss','sl',stw));
document.getElementById('ws').addEventListener('input',()=>fw('ws','wl',wl35));
</script>
</body>
